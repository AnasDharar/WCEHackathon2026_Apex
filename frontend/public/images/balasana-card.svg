<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Child's pose yoga illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9fff6"/>
      <stop offset="0.55" stop-color="#f1f5ff"/>
      <stop offset="1" stop-color="#fff4e8"/>
    </linearGradient>
    <radialGradient id="halo" cx="52%" cy="38%" r="62%">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#60a5fa" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur20" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="560" cy="350" r="520" fill="url(#halo)" filter="url(#blur20)"/>
  <circle cx="1160" cy="520" r="520" fill="url(#halo)" filter="url(#blur20)"/>

  <path d="M0 760 C 260 690, 560 830, 880 770 C 1180 715, 1370 790, 1600 740 L 1600 900 L 0 900 Z"
        fill="#0f172a" opacity="0.08"/>

  <!-- title glass -->
  <g filter="url(#shadow)">
    <rect x="120" y="120" width="560" height="180" rx="34" fill="#ffffff" fill-opacity="0.28" stroke="#ffffff" stroke-opacity="0.4"/>
  </g>
  <g fill="#0f172a">
    <text x="168" y="205" font-size="44" font-weight="650"
          font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial">
      Childs Pose
    </text>
    <text x="168" y="252" font-size="22" opacity="0.68"
          font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial">
      Balasana
    </text>
  </g>

  <!-- childs pose figure -->
  <g transform="translate(1010 560)">
    <!-- mat -->
    <path d="M-320 220 C -200 190, 200 190, 320 220 C 345 226, 345 274, 320 282 C 200 320, -200 320, -320 282 C -345 274, -345 226, -320 220 Z"
          fill="#0f172a" opacity="0.11"/>

    <!-- torso + hips -->
    <path d="M-150 70 C -120 20, -70 -8, -10 -8 C 50 -8, 95 18, 120 60
             C 145 104, 125 150, 70 165 C 20 178, -60 175, -120 150 C -165 132, -175 105, -150 70 Z"
          fill="#10b981" opacity="0.86"/>

    <!-- head on floor -->
    <circle cx="-170" cy="130" r="42" fill="#ffd7c2"/>
    <path d="M-205 122 C -190 95, -160 90, -140 110" fill="#0f172a" opacity="0.35"/>

    <!-- arms stretched forward -->
    <path d="M-105 95 C -190 70, -255 55, -320 70" fill="none" stroke="#ffd7c2" stroke-width="28" stroke-linecap="round"/>
    <path d="M-110 125 C -195 110, -260 110, -330 125" fill="none" stroke="#ffd7c2" stroke-width="22" stroke-linecap="round" opacity="0.95"/>

    <!-- legs tucked -->
    <path d="M60 175 C 130 170, 190 185, 235 210" fill="none" stroke="#0f172a" stroke-opacity="0.28" stroke-width="34" stroke-linecap="round"/>
    <path d="M10 182 C 80 190, 125 205, 165 235" fill="none" stroke="#0f172a" stroke-opacity="0.22" stroke-width="26" stroke-linecap="round"/>

    <!-- breathing waves -->
    <g opacity="0.75">
      <path d="M-150 30 C -70 10, 20 10, 100 30" fill="none" stroke="#38bdf8" stroke-width="10" stroke-linecap="round" filter="url(#blur20)"/>
      <path d="M-165 10 C -80 -12, 40 -12, 125 10" fill="none" stroke="#34d399" stroke-width="10" stroke-linecap="round" filter="url(#blur20)"/>
    </g>
  </g>
</svg>
