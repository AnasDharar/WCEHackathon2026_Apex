<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Calm breathing exercise banner">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d8eef2"/>
      <stop offset="0.32" stop-color="#dff1ef"/>
      <stop offset="0.62" stop-color="#edf5e8"/>
      <stop offset="1" stop-color="#bdd9df"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="28%" r="54%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="0.42" stop-color="#f5fbff" stop-opacity="0.82"/>
      <stop offset="0.78" stop-color="#d7e8ec" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#d7e8ec" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cornerShade" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#456a6b" stop-opacity="0"/>
      <stop offset="1" stop-color="#19393e" stop-opacity="0.55"/>
    </radialGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c6ddb8"/>
      <stop offset="0.55" stop-color="#9fbf99"/>
      <stop offset="1" stop-color="#6f9478"/>
    </linearGradient>
    <linearGradient id="mat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#bb7b68"/>
      <stop offset="1" stop-color="#d7927e"/>
    </linearGradient>
    <linearGradient id="topWear" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b34736"/>
      <stop offset="0.6" stop-color="#c75b47"/>
      <stop offset="1" stop-color="#8e3a2f"/>
    </linearGradient>
    <linearGradient id="pants" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3f3149"/>
      <stop offset="1" stop-color="#241e32"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd2b4"/>
      <stop offset="1" stop-color="#f0b08f"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b3026"/>
      <stop offset="1" stop-color="#3c201c"/>
    </linearGradient>
    <filter id="blur20" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="blur8" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#243437" flood-opacity="0.2"/>
    </filter>
    <g id="flower">
      <ellipse cx="0" cy="-10" rx="10" ry="16" fill="#fefefe"/>
      <ellipse cx="9" cy="-4" rx="10" ry="16" fill="#f7fbfd" transform="rotate(72 9 -4)"/>
      <ellipse cx="6" cy="7" rx="10" ry="16" fill="#ffffff" transform="rotate(144 6 7)"/>
      <ellipse cx="-6" cy="7" rx="10" ry="16" fill="#f8fbfd" transform="rotate(216 -6 7)"/>
      <ellipse cx="-9" cy="-4" rx="10" ry="16" fill="#ffffff" transform="rotate(288 -9 -4)"/>
      <circle cx="0" cy="0" r="4" fill="#e5d8b3"/>
    </g>
    <g id="leaf">
      <ellipse cx="0" cy="0" rx="7" ry="4" fill="#9fc4a5" transform="rotate(-18)"/>
    </g>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>
  <ellipse cx="800" cy="235" rx="470" ry="290" fill="url(#centerGlow)"/>
  <ellipse cx="320" cy="180" rx="250" ry="160" fill="#ffffff" opacity="0.32" filter="url(#blur20)"/>
  <ellipse cx="1280" cy="190" rx="250" ry="160" fill="#ffffff" opacity="0.32" filter="url(#blur20)"/>

  <!-- sun wash -->
  <path d="M660 0 L865 0 L1020 390 L780 390 Z" fill="#fffde8" opacity="0.35" filter="url(#blur8)"/>
  <path d="M1180 0 L1320 0 L1025 520 L905 520 Z" fill="#fffef3" opacity="0.22" filter="url(#blur8)"/>

  <!-- distant foliage -->
  <g opacity="0.34" fill="#98bcab">
    <ellipse cx="245" cy="520" rx="210" ry="115"/>
    <ellipse cx="460" cy="540" rx="210" ry="120"/>
    <ellipse cx="1180" cy="535" rx="220" ry="125"/>
    <ellipse cx="1380" cy="520" rx="190" ry="118"/>
    <ellipse cx="795" cy="600" rx="280" ry="95"/>
  </g>

  <!-- left tree -->
  <g opacity="0.44">
    <path d="M82 865 C 96 714, 126 604, 188 486 C 242 385, 288 325, 292 220" fill="none" stroke="#526b74" stroke-width="22" stroke-linecap="round"/>
    <path d="M180 496 C 152 378, 110 287, 48 218" fill="none" stroke="#657d86" stroke-width="12" stroke-linecap="round"/>
    <path d="M213 430 C 240 340, 284 278, 357 218" fill="none" stroke="#667d85" stroke-width="11" stroke-linecap="round"/>
    <path d="M242 354 C 194 296, 140 255, 74 221" fill="none" stroke="#6b838a" stroke-width="9" stroke-linecap="round"/>
    <path d="M250 320 C 300 262, 348 230, 420 205" fill="none" stroke="#6e858d" stroke-width="9" stroke-linecap="round"/>
    <path d="M152 600 C 118 540, 74 500, 26 474" fill="none" stroke="#6a8187" stroke-width="9" stroke-linecap="round"/>
    <path d="M225 565 C 286 520, 347 502, 414 492" fill="none" stroke="#6b838a" stroke-width="9" stroke-linecap="round"/>
  </g>

  <!-- right tree -->
  <g opacity="0.44">
    <path d="M1518 865 C 1504 714, 1474 604, 1412 486 C 1358 385, 1312 325, 1308 220" fill="none" stroke="#526b74" stroke-width="22" stroke-linecap="round"/>
    <path d="M1420 496 C 1448 378, 1490 287, 1552 218" fill="none" stroke="#657d86" stroke-width="12" stroke-linecap="round"/>
    <path d="M1387 430 C 1360 340, 1316 278, 1243 218" fill="none" stroke="#667d85" stroke-width="11" stroke-linecap="round"/>
    <path d="M1358 354 C 1406 296, 1460 255, 1526 221" fill="none" stroke="#6b838a" stroke-width="9" stroke-linecap="round"/>
    <path d="M1350 320 C 1300 262, 1252 230, 1180 205" fill="none" stroke="#6e858d" stroke-width="9" stroke-linecap="round"/>
    <path d="M1448 600 C 1482 540, 1526 500, 1574 474" fill="none" stroke="#6a8187" stroke-width="9" stroke-linecap="round"/>
    <path d="M1375 565 C 1314 520, 1253 502, 1186 492" fill="none" stroke="#6b838a" stroke-width="9" stroke-linecap="round"/>
  </g>

  <!-- blossom clusters -->
  <g opacity="0.9">
    <use href="#flower" transform="translate(135 180) scale(1.2)"/>
    <use href="#flower" transform="translate(195 145) scale(1)"/>
    <use href="#flower" transform="translate(245 208) scale(1.08)"/>
    <use href="#flower" transform="translate(298 164) scale(1.1)"/>
    <use href="#flower" transform="translate(360 200) scale(0.96)"/>
    <use href="#flower" transform="translate(430 154) scale(1.1)"/>
    <use href="#flower" transform="translate(505 185) scale(0.98)"/>
    <use href="#flower" transform="translate(555 230) scale(1.04)"/>
    <use href="#flower" transform="translate(420 254) scale(0.94)"/>
    <use href="#flower" transform="translate(272 265) scale(0.9)"/>
    <use href="#flower" transform="translate(173 244) scale(0.92)"/>

    <use href="#flower" transform="translate(1465 180) scale(1.2)"/>
    <use href="#flower" transform="translate(1405 145) scale(1)"/>
    <use href="#flower" transform="translate(1355 208) scale(1.08)"/>
    <use href="#flower" transform="translate(1302 164) scale(1.1)"/>
    <use href="#flower" transform="translate(1240 200) scale(0.96)"/>
    <use href="#flower" transform="translate(1170 154) scale(1.1)"/>
    <use href="#flower" transform="translate(1095 185) scale(0.98)"/>
    <use href="#flower" transform="translate(1045 230) scale(1.04)"/>
    <use href="#flower" transform="translate(1180 254) scale(0.94)"/>
    <use href="#flower" transform="translate(1328 265) scale(0.9)"/>
    <use href="#flower" transform="translate(1427 244) scale(0.92)"/>
  </g>

  <g opacity="0.7">
    <use href="#flower" transform="translate(95 288) scale(0.8)"/>
    <use href="#flower" transform="translate(205 324) scale(0.82)"/>
    <use href="#flower" transform="translate(352 310) scale(0.78)"/>
    <use href="#flower" transform="translate(470 342) scale(0.8)"/>
    <use href="#flower" transform="translate(1505 288) scale(0.8)"/>
    <use href="#flower" transform="translate(1395 324) scale(0.82)"/>
    <use href="#flower" transform="translate(1248 310) scale(0.78)"/>
    <use href="#flower" transform="translate(1130 342) scale(0.8)"/>
    <use href="#leaf" transform="translate(332 233) scale(1.3)"/>
    <use href="#leaf" transform="translate(1238 238) scale(1.3)"/>
    <use href="#leaf" transform="translate(465 280) scale(1.2)"/>
    <use href="#leaf" transform="translate(1135 280) scale(1.2)"/>
  </g>

  <!-- meadow -->
  <path d="M0 622 C 172 584, 312 614, 455 610 C 645 605, 730 550, 858 560 C 1018 574, 1136 631, 1600 590 L1600 900 L0 900 Z" fill="url(#grass)"/>
  <ellipse cx="806" cy="590" rx="300" ry="82" fill="#eef5cd" opacity="0.74" filter="url(#blur20)"/>
  <ellipse cx="800" cy="780" rx="540" ry="112" fill="#587961" opacity="0.16" filter="url(#blur20)"/>

  <!-- mat -->
  <g filter="url(#shadow)">
    <rect x="420" y="662" width="760" height="125" rx="28" fill="url(#mat)"/>
  </g>

  <!-- seated figure -->
  <g transform="translate(800 498)">
    <!-- hair back -->
    <path d="M-86 -152 C -106 -70, -112 18, -88 102 C -71 160, -33 189, 0 184 C 33 189, 71 160, 88 102 C 112 18, 106 -70, 86 -152
             C 70 -214, 42 -250, 0 -252 C -42 -250, -70 -214, -86 -152 Z" fill="url(#hair)"/>

    <!-- neck -->
    <rect x="-21" y="-66" width="42" height="42" rx="18" fill="url(#skin)"/>

    <!-- face -->
    <ellipse cx="0" cy="-116" rx="64" ry="82" fill="url(#skin)"/>
    <path d="M-63 -137 C -53 -214, -12 -249, 0 -250 C 12 -249, 53 -214, 63 -137
             C 38 -154, 18 -162, 0 -162 C -18 -162, -38 -154, -63 -137 Z" fill="url(#hair)"/>
    <path d="M-84 -135 C -92 -44, -78 39, -37 109" fill="none" stroke="#5a2f28" stroke-width="15" stroke-linecap="round"/>
    <path d="M84 -135 C 92 -44, 78 39, 37 109" fill="none" stroke="#5a2f28" stroke-width="15" stroke-linecap="round"/>
    <path d="M-33 -123 C -21 -129, -9 -129, 3 -123" fill="none" stroke="#6a372f" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
    <path d="M-31 -88 C -18 -81, -8 -81, 2 -88" fill="none" stroke="#5e332c" stroke-width="4" stroke-linecap="round"/>
    <path d="M29 -88 C 18 -81, 8 -81, -2 -88" fill="none" stroke="#5e332c" stroke-width="4" stroke-linecap="round" transform="translate(0 0) scale(-1 1)"/>
    <path d="M-16 -63 C -4 -55, 4 -55, 16 -63" fill="none" stroke="#d18774" stroke-width="4" stroke-linecap="round"/>
    <path d="M-12 -28 C -4 -20, 4 -20, 12 -28" fill="none" stroke="#a65d50" stroke-width="4" stroke-linecap="round"/>

    <!-- torso -->
    <path d="M-126 38 C -118 -15, -86 -52, -52 -70 C -27 -83, 27 -83, 52 -70 C 86 -52, 118 -15, 126 38
             L150 218 C 112 252, 62 273, 0 278 C -62 273, -112 252, -150 218 Z" fill="url(#topWear)"/>
    <path d="M-95 8 C -70 20, -28 28, 0 30 C 28 28, 70 20, 95 8" fill="none" stroke="#d77a66" stroke-width="3" opacity="0.35"/>
    <path d="M-60 -6 C -35 10, 35 10, 60 -6" fill="none" stroke="#edab97" stroke-width="3" opacity="0.28"/>

    <!-- right arm to chest -->
    <path d="M-116 84 C -136 122, -150 155, -163 187" fill="none" stroke="url(#topWear)" stroke-width="52" stroke-linecap="round"/>
    <path d="M-162 188 C -126 168, -78 136, -18 95" fill="none" stroke="url(#skin)" stroke-width="34" stroke-linecap="round"/>
    <path d="M-16 94 C 8 96, 42 103, 68 112" fill="none" stroke="url(#skin)" stroke-width="28" stroke-linecap="round"/>

    <!-- left arm down -->
    <path d="M119 94 C 142 132, 156 178, 170 225" fill="none" stroke="url(#topWear)" stroke-width="52" stroke-linecap="round"/>
    <path d="M170 226 C 191 254, 214 286, 233 319" fill="none" stroke="url(#skin)" stroke-width="30" stroke-linecap="round"/>

    <!-- left hand mudra -->
    <path d="M236 320 C 255 302, 275 301, 292 316" fill="none" stroke="url(#skin)" stroke-width="14" stroke-linecap="round"/>
    <path d="M260 307 C 270 326, 287 337, 307 336" fill="none" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
    <path d="M270 323 C 281 342, 297 353, 316 354" fill="none" stroke="url(#skin)" stroke-width="9" stroke-linecap="round"/>

    <!-- legs / pants -->
    <path d="M-280 330 C -214 252, -142 225, -74 236 C -15 246, 37 281, 106 336
             C 42 372, -8 392, -97 389 C -186 385, -242 369, -280 330 Z" fill="url(#pants)"/>
    <path d="M280 330 C 214 252, 142 225, 74 236 C 15 246, -37 281, -106 336
             C -42 372, 8 392, 97 389 C 186 385, 242 369, 280 330 Z" fill="url(#pants)"/>
    <path d="M-110 336 C -44 308, 30 309, 112 337 C 80 373, 34 389, 0 389 C -34 389, -80 373, -110 336 Z" fill="#30283d"/>

    <!-- feet -->
    <path d="M-26 374 C -57 376, -87 393, -119 426 C -95 441, -53 442, -4 433 C 29 427, 51 415, 69 395 C 47 381, 12 373, -26 374 Z" fill="url(#skin)"/>
    <path d="M88 373 C 56 374, 16 392, -18 431 C 25 444, 72 442, 117 432 C 149 424, 171 410, 188 392 C 163 378, 129 371, 88 373 Z" fill="url(#skin)" opacity="0.96"/>
  </g>

  <!-- foreground grass -->
  <g opacity="0.82" stroke-linecap="round">
    <path d="M34 900 C 57 826, 80 783, 120 738" stroke="#55785d" stroke-width="8"/>
    <path d="M82 900 C 112 812, 136 762, 176 702" stroke="#608164" stroke-width="7"/>
    <path d="M128 900 C 153 822, 167 788, 190 744" stroke="#6d8d66" stroke-width="6"/>
    <path d="M1466 900 C 1443 826, 1420 783, 1380 738" stroke="#55785d" stroke-width="8"/>
    <path d="M1418 900 C 1388 812, 1364 762, 1324 702" stroke="#608164" stroke-width="7"/>
    <path d="M1372 900 C 1347 822, 1333 788, 1310 744" stroke="#6d8d66" stroke-width="6"/>
    <path d="M270 900 C 290 826, 313 790, 342 742" stroke="#668869" stroke-width="7"/>
    <path d="M1330 900 C 1310 826, 1287 790, 1258 742" stroke="#668869" stroke-width="7"/>
    <path d="M540 900 C 546 842, 552 798, 567 758" stroke="#628566" stroke-width="6"/>
    <path d="M1060 900 C 1054 842, 1048 798, 1033 758" stroke="#628566" stroke-width="6"/>
  </g>

  <!-- soft vignette -->
  <rect width="1600" height="900" fill="url(#cornerShade)"/>
</svg>
