<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9fff6"/>
      <stop offset="0.55" stop-color="#f3fbff"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="45%" r="60%">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#38bdf8" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="520" cy="420" r="520" fill="url(#orb)" />
  <circle cx="1120" cy="520" r="520" fill="url(#orb)" />

  <!-- soft hills -->
  <path d="M0 720 C 260 650, 430 760, 700 700 C 950 645, 1150 720, 1600 670 L 1600 900 L 0 900 Z"
        fill="#0f172a" opacity="0.06"/>
  <path d="M0 770 C 240 705, 520 820, 820 760 C 1100 705, 1310 780, 1600 725 L 1600 900 L 0 900 Z"
        fill="#0f172a" opacity="0.08"/>

  <!-- figure -->
  <g transform="translate(860 490)">
    <circle cx="0" cy="-160" r="64" fill="#0f172a" opacity="0.88"/>
    <path d="M-140 40 C -80 -20, -30 -40, 0 -40 C 30 -40, 80 -20, 140 40"
          fill="none" stroke="#0f172a" stroke-width="26" stroke-linecap="round" opacity="0.86"/>
    <path d="M-95 60 C -70 120, -40 150, 0 150 C 40 150, 70 120, 95 60"
          fill="none" stroke="#0f172a" stroke-width="26" stroke-linecap="round" opacity="0.86"/>
    <path d="M-45 95 C -25 60, -15 25, -10 -5 C -8 -20, 8 -20, 10 -5 C 15 25, 25 60, 45 95"
          fill="none" stroke="#0f172a" stroke-width="22" stroke-linecap="round" opacity="0.86"/>

    <!-- nostril breathing cue lines -->
    <path d="M-240 -120 C -170 -140, -130 -120, -95 -100" fill="none" stroke="#34d399" stroke-width="10" stroke-linecap="round" opacity="0.75" filter="url(#soft)"/>
    <path d="M240 -120 C 170 -140, 130 -120, 95 -100" fill="none" stroke="#38bdf8" stroke-width="10" stroke-linecap="round" opacity="0.75" filter="url(#soft)"/>
  </g>

  <!-- label -->
  <g opacity="0.9">
    <text x="110" y="190" font-size="56" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" fill="#0f172a">
      Anulom Vilom
    </text>
    <text x="110" y="250" font-size="26" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" fill="#0f172a" opacity="0.72">
      Alternate Nostril Breathing
    </text>
  </g>
</svg>
